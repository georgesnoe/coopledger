openapi: 3.0.3
info:
  title: CoopLedger API
  description: API pour la gestion des coopératives agricoles intégrant la blockchain pour la transparence.
  version: 1.0.0
servers:
  - url: /api
paths:
  /auth/{any}:
    get:
      summary: Points d'entrée pour l'authentification (Better-Auth)
      parameters:
        - name: any
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Points d'entrée pour l'authentification (Better-Auth)
      parameters:
        - name: any
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /auth/whatsapp/send-code:
    post:
      summary: Envoyer un code OTP via WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
      responses:
        '200':
          description: Code envoyé
  /auth/whatsapp/verify:
    post:
      summary: Vérifier le code OTP WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Code vérifié
  /cooperatives:
    get:
      summary: Lister les coopératives
      responses:
        '200':
          description: Liste des coopératives
  /cooperatives/create:
    post:
      summary: Créer une nouvelle coopérative
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                founders:
                  type: array
                  items:
                    type: string
                logo:
                  type: string
                  format: binary
                status_document:
                  type: string
                  format: binary
                proof_document:
                  type: string
                  format: binary
                identity_document:
                  type: string
                  format: binary
                business_plan_document:
                  type: string
                  format: binary
      responses:
        '201':
          description: Coopérative créée
        '400':
          description: Champs manquants
  /cooperatives/join:
    post:
      summary: Demander à rejoindre une coopérative
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cooperativeId:
                  type: string
      responses:
        '201':
          description: Demande d'adhésion créée
  /cooperatives/join/approve:
    post:
      summary: Approuver ou rejeter une demande d'adhésion
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cooperativeId:
                  type: string
                memberId:
                  type: string
                isApproved:
                  type: boolean
      responses:
        '200':
          description: Statut mis à jour
  /votes/propose:
    post:
      summary: Proposer un nouveau vote
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                proposals:
                  type: array
                  items:
                    type: string
                endDate:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Proposition créée
  /votes/cast:
    post:
      summary: Voter pour une proposition
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                voteId:
                  type: string
                userId:
                  type: string
      responses:
        '201':
          description: Vote enregistré
  /payments/initiate:
    post:
      summary: Initier un paiement via FedaPay
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                description:
                  type: string
      responses:
        '200':
          description: Transaction FedaPay créée
  /payments/callback:
    post:
      summary: Webhook de confirmation de paiement FedaPay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Callback traité
  /user/dashboard:
    get:
      summary: Récupérer les données du tableau de bord utilisateur
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Données du dashboard
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session-token
