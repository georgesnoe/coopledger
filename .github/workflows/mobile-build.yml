name: Mobile APK Build

on:
  push:
    tags:
      - 'm*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd mobile
          npm install

      - name: Expo Prebuild
        run: |
          cd mobile
          npx expo prebuild --platform android

      - name: Build Android APK (Optimized)
        run: |
          cd mobile/android
          chmod +x gradlew
          # Using the optimization from sortie.txt: limit architecture to arm64-v8a to reduce size
          ./gradlew app:assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coopledger-mobile-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
